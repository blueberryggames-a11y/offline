<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>YT Offline</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a25;
      --border: #ffffff12;
      --border2: #ffffff22;
      --accent: #ff3c3c;
      --accent2: #ff6b35;
      --text: #f0f0f5;
      --muted: #888899;
      --success: #22c55e;
      --radius: 10px;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── App Shell ────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .server-status {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot.offline { background: var(--accent); }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid;
    }

    .badge.online { color: var(--success); border-color: var(--success); background: #22c55e18; }
    .badge.offline { color: var(--accent); border-color: var(--accent); background: #ff3c3c18; }

    /* ── Views ────────────────────────────────────────────── */
    .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .view.active { display: flex; }

    /* ── Library View ─────────────────────────────────────── */
    #view-library {
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    /* ── Download Section ─────────────────────────────────── */
    .download-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .url-row {
      display: flex;
      gap: 10px;
    }

    .url-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .dl-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 12px 18px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .dl-btn:active { transform: scale(0.97); }
    .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Preview */
    .preview-box {
      margin-top: 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .preview-box.hidden { display: none; }

    .preview-thumb {
      width: 90px;
      height: 54px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: var(--bg);
    }

    .preview-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .preview-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Confirm bar */
    .confirm-bar {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    .confirm-bar.hidden { display: none; }

    .confirm-btn {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      border: none;
    }

    .confirm-btn:active { transform: scale(0.97); }

    .confirm-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .confirm-btn.secondary {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    /* Progress */
    .progress-wrap {
      margin-top: 12px;
    }

    .progress-wrap.hidden { display: none; }

    .progress-track {
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* ── Library Grid ─────────────────────────────────────── */
    .library-header {
      padding: 18px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .video-grid {
      padding: 0 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .video-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .video-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, var(--accent)08);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .video-card:hover { border-color: var(--border2); background: var(--bg3); }
    .video-card:hover::before { opacity: 1; }
    .video-card:active { transform: scale(0.99); }

    .card-thumb {
      width: 100px;
      height: 60px;
      flex-shrink: 0;
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg3);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg3), var(--bg));
    }

    .card-duration {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: #000000cc;
      color: white;
      font-family: var(--mono);
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .card-play-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #00000066;
      color: white;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .video-card:hover .card-play-icon { opacity: 1; }

    .card-info { flex: 1; min-width: 0; }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .card-meta, .card-date {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .card-meta { margin-bottom: 2px; }

    .card-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }

    .video-card:hover .card-delete { opacity: 1; }
    .card-delete:hover { color: var(--accent); }

    /* Empty State */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state.hidden { display: none; }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .empty-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Player View ──────────────────────────────────────── */
    #view-player {
      background: #000;
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .back-btn:hover { background: var(--bg2); }

    .player-title-wrap { flex: 1; min-width: 0; }

    .player-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 2px;
    }

    .video-container {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    #video-player {
      width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      outline: none;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 40px;
      font-family: var(--mono);
      font-size: 12px;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--accent); color: var(--accent); }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes pulse {
      0%, 100% { width: 40%; }
      50% { width: 80%; }
    }

    /* ── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Mobile Tweaks ────────────────────────────────────── */
    @media (max-width: 480px) {
      .logo-text { font-size: 14px; }
      .card-thumb { width: 80px; height: 50px; }
      .download-section { padding: 16px; }
      .video-grid { padding: 0 14px 40px; }
      .library-header { padding: 14px 14px 8px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div class="logo-text">YT<span>OFFLINE</span></div>
    </div>
    <div class="server-status">
      <div class="dot offline" id="server-dot"></div>
      <div class="badge offline" id="server-badge">Checking…</div>
    </div>
  </header>

  <!-- ── Library View ── -->
  <div class="view active" id="view-library">
    <div class="download-section">
      <div class="section-label">Download Video</div>
      <div class="url-row">
        <input
          class="url-input"
          id="url-input"
          type="url"
          placeholder="https://youtube.com/watch?v=..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button class="dl-btn" id="dl-btn" onclick="handleDownload()">Fetch Info</button>
      </div>

      <!-- Preview -->
      <div class="preview-box hidden" id="preview-box">
        <img class="preview-thumb" id="preview-thumb" src="" alt="" />
        <div>
          <div class="preview-title" id="preview-title"></div>
          <div class="preview-meta" id="preview-meta"></div>
        </div>
      </div>

      <!-- Confirm buttons -->
      <div class="confirm-bar hidden" id="confirm-bar">
        <button class="confirm-btn secondary" onclick="hidePreview(); setDownloadState('idle')">Cancel</button>
        <button class="confirm-btn primary" onclick="confirmDownload()">⬇ Download 720p</button>
      </div>

      <!-- Progress -->
      <div class="progress-wrap hidden" id="progress-wrap">
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-label" id="progress-label">Starting download…</div>
      </div>
    </div>

    <!-- Library -->
    <div class="library-header">
      <div class="section-label" style="margin: 0">Your Library</div>
    </div>

    <div class="video-grid" id="video-grid"></div>

    <div class="empty-state hidden" id="empty-state">
      <div class="empty-icon">📥</div>
      <div class="empty-title">No videos yet</div>
      <div class="empty-desc">
        Start your local server on your PC,<br>
        then paste a YouTube URL above.
      </div>
    </div>
  </div>

  <!-- ── Player View ── -->
  <div class="view" id="view-player">
    <div class="player-header">
      <button class="back-btn" onclick="closePlayer()">←</button>
      <div class="player-title-wrap">
        <div class="player-title" id="player-title"></div>
        <div class="player-meta" id="player-meta"></div>
      </div>
    </div>
    <div class="video-container">
      <video id="video-player" controls playsinline></video>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>
</body>
</html>
